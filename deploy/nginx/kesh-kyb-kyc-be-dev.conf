# Nginx reverse-proxy config — kesh-kyb-kyc-be (development)
#
# IMPORTANT: Replace `kyc-api-dev.kesh.co.id` with the actual
#            domain / IP of your development server before use.
#
# Install:
#   sudo cp deploy/nginx/kesh-kyb-kyc-be-dev.conf /etc/nginx/sites-available/kesh-kyb-kyc-be-dev
#   sudo ln -s /etc/nginx/sites-available/kesh-kyb-kyc-be-dev /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name kyc-api-dev.kesh.co.id;   # <-- change to your domain or IP

    # Redirect HTTP → HTTPS once SSL is set up (uncomment after certbot)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    # ── Proxy to NestJS ───────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout    120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
    }
}

